        * {

        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-color: #0e0e10;
            color: #efeff1;
            -webkit-text-size-adjust: 100%;
        }

        ::selection {
            background-color: rgba(145, 70, 255, 0.5);
            color: white;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0e0e10;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555558;
        }

        /* Glassmorphism Classes */
        .glass-header {
            background: rgba(14, 14, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(31, 31, 35, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-card:hover {
            background: rgba(35, 35, 40, 0.8);
            border-color: rgba(145, 70, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(145, 70, 255, 0.1);
        }

        /* Live Effects */
        .live-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid #eb0400;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            pointer-events: none;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(1.4); opacity: 0; }
        }

        /* Entry Animations */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-item {
            opacity: 0;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Glowing Refresh Button */
        .btn-glow {
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(120deg, #9146FF, #ff416c, #00c9ff, #9146FF);
            background-size: 300%;
            z-index: -1;
            transition: opacity 0.3s;
            animation: animate-gradient 4s linear infinite;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.6);
            transform: scale(1.02);
        }

        .btn-glow:active {
            transform: scale(0.98);
        }

        @keyframes animate-gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Grade Badges */
        .badge-base {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
        }

        .badge-t1 { background: linear-gradient(135deg, #FACC15 0%, #F59E0B 100%); color: #451A03; box-shadow: 0 2px 10px rgba(250,204,21,0.2); }
        .badge-t2p { background: linear-gradient(135deg, #22D3EE 0%, #3B82F6 100%); color: #FFFFFF; box-shadow: 0 2px 10px rgba(34,211,238,0.2); }

        .badge-t3  { background: linear-gradient(135deg, #4B5563 0%, #6B7280 100%); color: #F3F4F6; }
        .badge-offline { background: rgba(255, 255, 255, 0.05); color: #9CA3AF; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .watermark {
            pointer-events: none;
            user-select: none;

        function renderListArea() {
            const listContainer = document.getElementById('main-list-container');
            listContainer.innerHTML = '';

            // 排序邏輯：1. Live優先 2. 分級權重 3. 同樣分級才比觀看數
            const rankOrder = { 'T1': 1, 'T2P': 2, 'T2': 3, 'T3': 4 };
            alliesData.sort((a, b) => {
                if (a.isLive !== b.isLive) return a.isLive ? -1 : 1;
                if (rankOrder[a.type] !== rankOrder[b.type]) return rankOrder[a.type] - rankOrder[b.type];
                if (a.isLive && b.isLive) return (b.viewerCount || 0) - (a.viewerCount || 0);
                return 0;
            });

            let dividerAdded = false;

            alliesData.forEach((ally, index) => {
                if (!ally.isLive && !dividerAdded && index > 0) {
                    listContainer.innerHTML += `
                        <div class="flex items-center gap-4 py-8 px-4 opacity-60">
                            <div class="h-[1px] bg-gradient-to-r from-transparent via-gray-700 to-transparent flex-1"></div>
                            <span class="text-sm font-black text-gray-500 uppercase tracking-[0.2em] flex items-center gap-2">

                            </span>

                        </div>`;
                    dividerAdded = true;
                }

                const delay = index * 0.03; // Waterfall animation
                const avatarFallbackUrl = `https://ui-avatars.com/api/?name=${encodeURIComponent(ally.name)}&background=18181b&color=9146FF`;
                const avatarUrl = ally.avatar || avatarFallbackUrl;
                
                // Badges

                    'T1': 'badge-t1',
                    'T2P': 'badge-t2p',
                    'T2': 'badge-t2',
                    'T3': 'badge-t3'
                };
                const typeLabel = ally.type === 'T2P' ? 'T2★' : ally.type;
                const finalBadgeStyle = ally.isLive ? badgeStyleMap[ally.type] : 'badge-offline';
                const badgeHtml = `<span class="badge-base ${finalBadgeStyle}">${typeLabel}</span>`;

                // Live Tags
                const liveTagDesktop = ally.isLive
                    ? `<div class="flex items-center gap-2.5 bg-red-500/10 border border-red-500/20 px-3 py-1.5 rounded-full text-red-500 shadow-[0_0_15px_rgba(235,4,0,0.1)] w-max">
                           <div class="w-3 h-3 rounded-full bg-red-500 animate-pulse"></div>
                           <span class="text-sm font-bold tracking-wider">${ally.viewerCount.toLocaleString()} <span class="text-[10px] opacity-80 uppercase ml-0.5">Viewers</span></span>
                       </div>`
                    : `<div class="flex items-center gap-2 text-gray-600 px-3 py-1.5 w-max">
                           <div class="w-2.5 h-2.5 rounded-full border border-gray-600"></div>
                           <span class="text-[11px] font-bold uppercase tracking-widest">Offline</span>
                       </div>`;
                       
                const liveTagMobile = ally.isLive
                    ? `<div class="flex items-center gap-1.5 text-red-500">
                           <div class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse"></div>
                           <span class="text-sm font-black tracking-wide">${ally.viewerCount.toLocaleString()} Viewers</span>
                       </div>`
                    : `<div class="flex items-center gap-1.5 text-gray-600 text-sm font-bold"><i data-lucide="moon" class="w-3.5 h-3.5"></i> 離線中</div>`;

                // Intro processing
                const hasIntro = ally.intro && ally.intro !== '-';
                const introHtml = hasIntro 
                    ? `<span class="text-gray-400 text-sm">「 ${ally.intro} 」</span>` 
                    : `<span class="opacity-30 italic text-sm">無相關備註</span>`;

                // Render Card Row
                listContainer.innerHTML += `
                    <div class="relative overflow-hidden group glass-card rounded-2xl p-4 md:px-5 md:py-3.5 mb-3 animate-item flex flex-col md:flex-row md:items-center gap-4 transition-all" style="animation-delay: ${delay}s">
                        
                        <!-- Hover Glow Effect (Desktop mostly visible) -->
                        <div class="absolute inset-0 bg-gradient-to-r from-twitch/0 via-twitch/5 to-twitch/0 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none -translate-x-full group-hover:translate-x-full duration-1000 ease-in-out"></div>

                        <!-- 1. 實況主資訊 (包含 Mobile Live Badge) -->
                        <div class="flex items-center justify-between md:justify-start md:w-3/12 gap-3 relative z-10 w-full">
                            <div class="flex items-center gap-3.5 min-w-0">
                                <div class="relative flex-shrink-0">
                                    <img src="${avatarUrl}" class="w-14 h-14 md:w-12 md:h-12 rounded-full object-cover shadow-[0_0_15px_rgba(0,0,0,0.5)] ${ally.isLive ? 'ring-2 ring-red-500 ring-offset-2 ring-offset-[#141417] shadow-[0_0_15px_rgba(235,4,0,0.4)]' : 'opacity-70 grayscale-[20%] border border-white/10'} transition-all group-hover:grayscale-0 group-hover:opacity-100">
                                </div>
                                <div class="flex flex-col min-w-0">
                                    <span class="font-bold text-gray-100 text-lg md:text-[17px] tracking-wide truncate ${ally.isLive ? '' : 'text-gray-400'}">${ally.name}</span>
                                    <div class="flex items-center gap-2 mt-0.5 md:hidden">
                                        <a href="https://twitch.tv/${ally.id}" target="_blank" class="text-twitch hover:text-twitch-accent hover:underline text-sm flex items-center truncate tracking-wide focus:outline-none">
                                            @${ally.id}
                                        </a>
                                        <button onclick="copyRaidCmd(event, this, '${ally.id}')" title="複製揪團指令" class="p-1 rounded bg-[#18181b] hover:bg-gray-700 border border-gray-800 text-gray-400 hover:text-white transition-colors focus:outline-none focus:ring-1 focus:ring-twitch/50 flex-shrink-0 cursor-pointer">
                                            <i data-lucide="copy" class="w-3 h-3"></i>
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <!-- Mobile Badge -->
                            <div class="md:hidden flex-shrink-0 ml-2">
                                ${badgeHtml}
                            </div>
                        </div>

                        <!-- 2. 直播狀態 (Desktop) -->
                        <div class="md:w-2/12 hidden md:flex items-center relative z-10">
                            ${liveTagDesktop}
                        </div>

                        <!-- 3. 頻道連結 (Desktop) -->
                        <div class="md:w-2/12 hidden md:flex items-center gap-2 min-w-0 relative z-10">
                            <a href="https://twitch.tv/${ally.id}" target="_blank" class="text-twitch hover:text-twitch-accent transition-colors text-base flex items-center gap-1.5 group/link w-max truncate focus:outline-none">
                                <div class="p-1.5 rounded-lg bg-twitch/10 group-hover/link:bg-twitch/20 transition-colors">
                                    <i data-lucide="external-link" class="w-4 h-4"></i>
                                </div>
                                <span class="truncate font-medium">@${ally.id}</span>
                            </a>
                            <button onclick="copyRaidCmd(event, this, '${ally.id}')" title="複製揪團指令 /raid ${ally.id}" class="p-1.5 rounded-lg bg-[#18181b] hover:bg-gray-700 border border-gray-800 text-gray-400 hover:text-white transition-colors focus:outline-none flex-shrink-0 cursor-pointer group/copy relative">
                                <i data-lucide="copy" class="w-3.5 h-3.5 group-hover/copy:scale-110 transition-transform"></i>
                            </button>
                        </div>

                        <!-- 4. 備註簡介 (Desktop & Mobile Box) -->

                            <div class="truncate w-full pr-2 leading-relaxed">
                                ${introHtml}
                            </div>
                            
                            <!-- Mobile Live Viewers & Action Row inside intro box -->
                            <div class="mt-3 flex items-center justify-between md:hidden border-t border-gray-800 pt-3">
                                ${liveTagMobile}
                                <a href="https://twitch.tv/${ally.id}" target="_blank" class="text-xs text-white bg-twitch/90 hover:bg-twitch px-3.5 py-2 rounded-lg font-bold flex items-center gap-1.5 active:scale-95 transition-transform shadow-[0_0_15px_rgba(145,70,255,0.3)]">
                                    前往實況 <i data-lucide="play" class="w-3.5 h-3.5"></i>

                `;

            // Re-initialize icons inside new DOM
            lucide.createIcons();

        function renderUI() {
            renderStatsArea();
            renderListArea();
        }

        async function getAccessToken() {
            try {
                const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${API_CONFIG.clientId}&client_secret=${API_CONFIG.clientSecret}&grant_type=client_credentials`, { method: 'POST' });
                const d = await res.json(); return d.access_token;
            } catch (e) { return null; }
        }

        async function refreshLiveStatus() {
            const btn = document.getElementById('refresh-btn');
            const iconWrap = document.getElementById('refresh-icon-wrapper');
            const bar = document.getElementById('status-bar');
            
            btn.disabled = true;
            btn.classList.add('opacity-80');
            iconWrap.classList.add('animate-spin-slow');
            bar.innerHTML = '<span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> <span class="text-blue-400">正在同步 Twitch 伺服器...</span>';

            if (!API_CONFIG.accessToken) API_CONFIG.accessToken = await getAccessToken();
            
            if (API_CONFIG.accessToken) {
                try {
                    const ids = alliesData.map(a => a.id);
                    const userMap = {};
                    const liveInfoMap = {};
                    const chunkSize = 100;

                    for (let i = 0; i < ids.length; i += chunkSize) {
                        const chunk = ids.slice(i, i + chunkSize);
                        const [uRes, sRes] = await Promise.all([
                            fetch(`https://api.twitch.tv/helix/users?login=${chunk.join('&login=')}`, { headers: { 'Client-ID': API_CONFIG.clientId, 'Authorization': `Bearer ${API_CONFIG.accessToken}` } }),
                            fetch(`https://api.twitch.tv/helix/streams?user_login=${chunk.join('&user_login=')}`, { headers: { 'Client-ID': API_CONFIG.clientId, 'Authorization': `Bearer ${API_CONFIG.accessToken}` } })
                        ]);
                        const uD = await uRes.json(); const sD = await sRes.json();
                        if (uD.data) uD.data.forEach(u => userMap[u.login.toLowerCase()] = u.profile_image_url);
                        if (sD.data) sD.data.forEach(s => {
                            liveInfoMap[s.user_login.toLowerCase()] = {
                                viewerCount: s.viewer_count
                            };
                        });
                    }

                    alliesData.forEach(a => {
                        const lowId = a.id.toLowerCase();
                        const liveInfo = liveInfoMap[lowId];
                        a.isLive = !!liveInfo;
                        a.viewerCount = liveInfo ? liveInfo.viewerCount : 0;
                        if (userMap[lowId]) a.avatar = userMap[lowId];
                    });
                    bar.innerHTML = '<span class="inline-block w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span> <span class="text-green-400 tracking-wider">● 同步成功</span>';
                } catch (e) { 
                    bar.innerHTML = '<span class="text-red-500 tracking-wider flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> 連線發生錯誤</span>';
                    lucide.createIcons();
                }
            } else {
                bar.innerHTML = '<span class="text-red-500 tracking-wider flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> 無法取得授權</span>';
                lucide.createIcons();
            }
            
            renderUI(); 
            btn.disabled = false;
            btn.classList.remove('opacity-80');
            
            // Remove spin after tiny delay for smoothness
            setTimeout(() => {
                iconWrap.classList.remove('animate-spin-slow');
            }, 600);
        }

        window.copyRaidCmd = async function(event, btn, id) {
            event.preventDefault();
            event.stopPropagation();
            
            const textToCopy = '/raid ' + id;
            let success = false;
            
            try {
                // 優先使用現代 Clipboard API (需在 https 或 localhost 環境)
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(textToCopy);
                    success = true;
                } else {
                    // 降級方案：支援本地 file:// 協議開啟的狀況
                    const textArea = document.createElement("textarea");
                    textArea.value = textToCopy;
                    // 將輸入框移出畫面
                    textArea.style.position = "absolute";
                    textArea.style.left = "-999999px";
                    document.body.prepend(textArea);
                    textArea.select();
                    
                    try {
                        success = document.execCommand('copy');
                    } catch (error) {
                        console.error('Fallback copy failed', error);
                    } finally {
                        textArea.remove();
                    }
                }

                if (!success) throw new Error('Copy failed');

                const icon = btn.querySelector('i');
                const oldIcon = icon.getAttribute('data-lucide');
                
                // 動畫切換成打勾
                icon.setAttribute('data-lucide', 'check');
                icon.classList.remove('group-hover/copy:scale-110');
                icon.classList.add('text-green-400', 'scale-125');
                lucide.createIcons({ root: btn });
                
                // 2秒後自動恢復
                setTimeout(() => {
                    icon.setAttribute('data-lucide', oldIcon);
                    icon.classList.add('group-hover/copy:scale-110');
                    icon.classList.remove('text-green-400', 'scale-125');
                    lucide.createIcons({ root: btn });
                }, 2000);
            } catch (e) {
                console.error('複製失敗', e);
                alert('您的瀏覽器不支援一鍵複製，請手動框選複製！\\n指令：' + textToCopy);
            }
        };

        // 初始載入
        renderUI(); // 先顯示骨架
        
        // 立即發送 Twitch API 請求更新資料，確保一打開網頁就開始載入圖片與人數
        setTimeout(() => {
            refreshLiveStatus();
        }, 50);
    </script>
