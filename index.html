    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            overflow-x: hidden;
            background-color: #0e0e10;
            color: #efeff1;
            -webkit-text-size-adjust: 100%;
        }

        ::selection {
            background-color: rgba(145, 70, 255, 0.5);
            color: white;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0e0e10;
        }

        ::-webkit-scrollbar-thumb {
            background: #3a3a3d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555558;
        }

        /* Glassmorphism Classes */
        .glass-header {
            background: rgba(14, 14, 16, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-panel {
            background: rgba(24, 24, 27, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-card {
            background: rgba(31, 31, 35, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .glass-card:hover {
            background: rgba(35, 35, 40, 0.8);
            border-color: rgba(145, 70, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5), 0 0 15px rgba(145, 70, 255, 0.1);
        }

        /* Live Effects */
        .live-ring::after {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid #eb0400;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
            pointer-events: none;
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(1);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.4);
                opacity: 0;
            }
        }

        /* Entry Animations */
        @keyframes slideUpFade {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-item {
            opacity: 0;
            animation: slideUpFade 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Glowing Refresh Button */
        .btn-glow {
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .btn-glow::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(120deg, #9146FF, #ff416c, #00c9ff, #9146FF);
            background-size: 300%;
            z-index: -1;
            transition: opacity 0.3s;
            animation: animate-gradient 4s linear infinite;
        }

        .btn-glow:hover {
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.6);
            transform: scale(1.02);
        }

        .btn-glow:active {
            transform: scale(0.98);
        }

        @keyframes animate-gradient {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* Grade Badges */
        .badge-base {
            padding: 0.35rem 0.85rem;
            border-radius: 9999px;
            font-size: 0.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 48px;
        }

        .badge-t1 {
            background: linear-gradient(135deg, #FACC15 0%, #F59E0B 100%);
            color: #451A03;
            box-shadow: 0 2px 10px rgba(250, 204, 21, 0.2);
        }

        .badge-t2 {
            background: linear-gradient(135deg, #22D3EE 0%, #3B82F6 100%);
            color: #FFFFFF;
            box-shadow: 0 2px 10px rgba(34, 211, 238, 0.2);
        }

        .badge-t3 {
            background: linear-gradient(135deg, #4B5563 0%, #6B7280 100%);
            color: #F3F4F6;
        }

        .badge-offline {
            background: rgba(255, 255, 255, 0.05);
            color: #9CA3AF;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .watermark {
            pointer-events: none;
            user-select: none;
            z-index: 50;
            background: rgba(145, 70, 255, 0.08);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(145, 70, 255, 0.15);
            box-shadow: 0 0 20px rgba(145, 70, 255, 0.1);
        }

        /* Tier Card Styles */
        .card-tier-t1 {
            background: rgba(250, 204, 21, 0.05) !important;
            border-left: 4px solid rgba(250, 204, 21, 0.4) !important;
        }

        .card-tier-t1:hover {
            background: rgba(250, 204, 21, 0.09) !important;
            border-left: 4px solid rgba(250, 204, 21, 0.8) !important;
        }

        .card-tier-t2 {
            background: rgba(34, 211, 238, 0.05) !important;
            border-left: 4px solid rgba(34, 211, 238, 0.4) !important;
        }

        .card-tier-t2:hover {
            background: rgba(34, 211, 238, 0.09) !important;
            border-left: 4px solid rgba(34, 211, 238, 0.8) !important;
        }

        .card-tier-t3 {

            border-left: 4px solid rgba(156, 163, 175, 0.2) !important;
        }

        .card-tier-t3:hover {
            background: rgba(156, 163, 175, 0.06) !important;
            border-left: 4px solid rgba(156, 163, 175, 0.5) !important;

    </style>
</head>

            </div>

            try {
                const res = await fetch(`https://id.twitch.tv/oauth2/token?client_id=${API_CONFIG.clientId}&client_secret=${API_CONFIG.clientSecret}&grant_type=client_credentials`, { method: 'POST' });
                const d = await res.json(); return d.access_token;
            } catch (e) { return null; }
        }

        async function refreshLiveStatus() {
            const btn = document.getElementById('refresh-btn');
            const iconWrap = document.getElementById('refresh-icon-wrapper');
            const bar = document.getElementById('status-bar');

            btn.disabled = true;
            btn.classList.add('opacity-80');
            iconWrap.classList.add('animate-spin-slow');
            bar.innerHTML = '<span class="inline-block w-1.5 h-1.5 rounded-full bg-blue-500 animate-pulse"></span> <span class="text-blue-400">正在同步 Twitch 伺服器...</span>';

            if (!API_CONFIG.accessToken) API_CONFIG.accessToken = await getAccessToken();

            if (API_CONFIG.accessToken) {
                try {
                    const ids = alliesData.map(a => a.id);
                    const userMap = {};
                    const liveInfoMap = {};
                    const chunkSize = 100;

                    for (let i = 0; i < ids.length; i += chunkSize) {
                        const chunk = ids.slice(i, i + chunkSize);
                        const [uRes, sRes] = await Promise.all([
                            fetch(`https://api.twitch.tv/helix/users?login=${chunk.join('&login=')}`, { headers: { 'Client-ID': API_CONFIG.clientId, 'Authorization': `Bearer ${API_CONFIG.accessToken}` } }),
                            fetch(`https://api.twitch.tv/helix/streams?user_login=${chunk.join('&user_login=')}`, { headers: { 'Client-ID': API_CONFIG.clientId, 'Authorization': `Bearer ${API_CONFIG.accessToken}` } })
                        ]);
                        const uD = await uRes.json(); const sD = await sRes.json();

                        let followersMap = {};
                        if (uD.data) {
                            const fPromises = uD.data.map(async u => {
                                try {
                                    const fRes = await fetch(`https://api.twitch.tv/helix/channels/followers?broadcaster_id=${u.id}`, { headers: { 'Client-ID': API_CONFIG.clientId, 'Authorization': `Bearer ${API_CONFIG.accessToken}` } });
                                    if (fRes.ok) {
                                        const fD = await fRes.json();
                                        followersMap[u.login.toLowerCase()] = fD.total;
                                    }
                                } catch (e) { }
                            });
                            await Promise.all(fPromises);

                            uD.data.forEach(u => userMap[u.login.toLowerCase()] = {
                                avatar: u.profile_image_url,
                                followers: followersMap[u.login.toLowerCase()] || 0
                            });
                        }

                        if (sD.data) sD.data.forEach(s => {
                            liveInfoMap[s.user_login.toLowerCase()] = {
                                viewerCount: s.viewer_count
                            };
                        });
                    }

                    // Calculate Monthly Follower Growth using localStorage
                    const now = new Date();
                    const monthKey = `follower_history_${now.getFullYear()}_${now.getMonth() + 1}`;
                    let historyObj = {};
                    try {
                        historyObj = JSON.parse(localStorage.getItem(monthKey) || '{}');
                    } catch (e) { }

                    let needSave = false;

                    alliesData.forEach(a => {
                        const lowId = a.id.toLowerCase();
                        const liveInfo = liveInfoMap[lowId];
                        a.isLive = !!liveInfo;
                        a.viewerCount = liveInfo ? liveInfo.viewerCount : 0;
                        if (userMap[lowId]) {
                            a.avatar = userMap[lowId].avatar;
                            a.followers = userMap[lowId].followers;
                        }

                        // Growth calculation
                        if (a.followers !== undefined) {
                            if (historyObj[lowId] === undefined) {
                                historyObj[lowId] = a.followers;
                                needSave = true;
                            }
                            a.followerGrowth = a.followers - historyObj[lowId];
                        } else {
                            a.followerGrowth = 0;
                        }
                    });

                    if (needSave) {
                        localStorage.setItem(monthKey, JSON.stringify(historyObj));
                    }

                    bar.innerHTML = '<span class="inline-block w-1.5 h-1.5 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span> <span class="text-green-400 tracking-wider">● 同步成功</span>';
                } catch (e) {
                    bar.innerHTML = '<span class="text-red-500 tracking-wider flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> 連線發生錯誤</span>';
                    lucide.createIcons();
                }
            } else {
                bar.innerHTML = '<span class="text-red-500 tracking-wider flex items-center gap-1"><i data-lucide="alert-triangle" class="w-3 h-3"></i> 無法取得授權</span>';
                lucide.createIcons();
            }

            renderUI();
            btn.disabled = false;
            btn.classList.remove('opacity-80');

            // Remove spin after tiny delay for smoothness
            setTimeout(() => {
                iconWrap.classList.remove('animate-spin-slow');
            }, 600);
        }

        function getTimeAgo(timestamp) {
            const now = new Date().getTime();
            const diff = now - timestamp;
            const seconds = Math.floor(diff / 1000);
            const minutes = Math.floor(seconds / 60);
            const hours = Math.floor(minutes / 60);
            const days = Math.floor(hours / 24);

            if (days > 0) return days + ' 天前';
            if (hours > 0) return hours + ' 小時前';
            if (minutes > 0) return minutes + ' 分鐘前';
            if (seconds > 10) return seconds + ' 秒前';
            return '剛才';
        }

        window.clearRaidHistory = function () {
            if (confirm('確定要清除所有揪團記錄嗎？')) {
                localStorage.removeItem('raid_history_v2');
                renderUI();
            }
        };

        function renderLatestRaidBanner() {
            const history = JSON.parse(localStorage.getItem('raid_history_v2') || '{}');
            const sorted = Object.entries(history).sort((a, b) => b[1] - a[1]);
            const banner = document.getElementById('latest-raid-banner');

            if (sorted.length > 0) {
                // 取前 5 筆
                const recentItems = sorted.slice(0, 5).map(([id, time]) => {
                    const ally = alliesData.find(a => a.id.toLowerCase() === id.toLowerCase());
                    const name = ally ? ally.name : id;
                    return `
                        <div class="inline-flex items-center gap-1.5 py-1 px-2.5 bg-twitch/10 border border-twitch/20 rounded-lg group/item hover:bg-twitch/20 transition-colors">
                            <span class="flex h-1.5 w-1.5 relative">
                                <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-twitch opacity-75"></span>
                                <span class="relative inline-flex rounded-full h-1.5 w-1.5 bg-twitch"></span>
                            </span>
                            <span class="text-[11px] font-bold text-gray-300">
                                <span class="text-white">${name}</span> 
                                <span class="text-twitch-accent/60 font-medium ml-0.5">${getTimeAgo(time)}</span>
                            </span>
                        </div>
                    `;
                }).join('');

                banner.innerHTML = `
                    <div class="flex flex-col gap-2">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2 text-[10px] font-black text-twitch-accent/60 uppercase tracking-[0.2em]">
                                <i data-lucide="history" class="w-3 h-3"></i> 最近揪團歷史
                            </div>
                            <button onclick="clearRaidHistory()" class="text-[10px] font-bold text-gray-500 hover:text-red-400 transition-colors flex items-center gap-1">
                                <i data-lucide="trash-2" class="w-2.5 h-2.5"></i> 清除紀錄
                            </button>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${recentItems}
                        </div>
                    </div>
                `;
                banner.classList.remove('hidden');
                lucide.createIcons({ root: banner });
            } else {
                banner.classList.add('hidden');
            }
        }

        window.copyRaidCmd = function (event, btn, id, name) {
            event.preventDefault();
            event.stopPropagation();

            const textToCopy = '/raid ' + id;

            // Save to history
            const history = JSON.parse(localStorage.getItem('raid_history_v2') || '{}');
            history[id.toLowerCase()] = new Date().getTime();
            localStorage.setItem('raid_history_v2', JSON.stringify(history));

            // Refresh UI to show last raid time
            renderUI();

            try {
                // 最暴力的無腦複製法：使用隱藏輸入框，相容所有主流與老舊瀏覽器
                const input = document.createElement("input");
                input.setAttribute("value", textToCopy);
                document.body.appendChild(input);

                // 完全隱藏
                input.style.position = "fixed";
                input.style.top = "-9999px";
                input.style.left = "-9999px";

                input.select();
                input.setSelectionRange(0, 99999); // 支援手機版 Safari

                document.execCommand("copy");
                document.body.removeChild(input);

                // 成功動畫切換成打勾
                const icon = btn.querySelector('i');
                if (icon) {
                    const oldIcon = icon.getAttribute('data-lucide');
                    icon.setAttribute('data-lucide', 'check');
                    icon.classList.remove('group-hover/copy:scale-110');
                    icon.classList.add('text-green-400', 'scale-125');
                    lucide.createIcons({ root: btn });

                    // 2秒後自動恢復
                    setTimeout(() => {
                        icon.setAttribute('data-lucide', oldIcon);
                        icon.classList.add('group-hover/copy:scale-110');
                        icon.classList.remove('text-green-400', 'scale-125');
                        lucide.createIcons({ root: btn });
                    }, 2000);
                }
            } catch (err) {
                console.error('複製徹底失敗', err);
                prompt('不好意思，您的瀏覽器安全層級較高阻擋了一鍵複製。\\n請直接手動複製以下指令：', textToCopy);
            }
        };

        // 初始載入
        renderUI(); // 先顯示骨架

        // 立即發送 Twitch API 請求更新資料，確保一打開網頁就開始載入圖片與人數
        setTimeout(() => {
            refreshLiveStatus();
        }, 50);
    </script>
</body>
